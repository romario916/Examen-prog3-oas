openapi: 3.1.0
info:
  title: Agricultural federation API
  description: |
    # Versioning
    - v0.0.1 (2026-04-21) : Implémentation des fonctionnalités de création, d'admission et des statistiques de la fédération.
  version: 0.0.1
servers:
  - url: 'https://localhost:8080'
paths:
  '/collectivities':
    post:
      summary: Création de collectivités
      description: Permet de créer une liste de collectivités.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
      responses:
        201:
          description: Liste des collectivités créées avec succès.
        400:
          description: Structure manquante ou approbation de la fédération absente.

  '/members':
    post:
      summary: Admission de nouveaux membres
      description: Permet d'enregistrer de nouveaux membres selon les critères d'admission.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        201:
          description: Membres admis avec succès.
        400:
          description: Problème de parrainage ou frais non payés.

  '/statistics/report':
    get:
      summary: Rapport global de la fédération
      description: Recensement mensuel et annuel des données statistiques par collectivité.
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        200:
          description: Rapport statistique généré.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FederationStat'

components:
  schemas:
    CreateCollectivity:
      type: object
      required: [location, structure]
      properties:
        location:
          type: string
        federationApproval:
          type: boolean
        structure:
          $ref: '#/components/schemas/CreateCollectivityStructure'

    CreateCollectivityStructure:
      type: object
      properties:
        president: { type: string }
        vicePresident: { type: string }
        treasurer: { type: string }
        secretary: { type: string }

    CreateMember:
      type: object
      required: [firstName, lastName, collectivityIdentifier]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        collectivityIdentifier:
          type: string
        registrationFeePaid:
          type: boolean
        membershipDuesPaid:
          type: boolean
        referees:
          type: array
          items:
            type: string

    FederationStat:
      type: object
      properties:
        collectivityName:
          type: string
        attendanceRate:
          type: number
          format: float
          description: "Taux d'assiduité global"
        membershipDuesPaidPercentage:
          type: number
          format: float
          description: "Pourcentage de membres à jour de cotisation"
        newAdherentsCount:
          type: integer
          description: "Nombre de nouveaux adhérents sur la période"

    Collectivity:
      type: object
      properties:
        id: { type: string }
        location: { type: string }

    Member:
      type: object
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }