openapi: 3.0.0
info:
  title: API Fédération Agricole de Madagascar
  description: Système complet (Admissions B-2, Trésorerie MGA, Activités E-F et Statistiques G-H).
  version: 1.0.0

tags:
- name: Collectivités
- name: Membres
- name: Finances
- name: Activités
- name: Statistiques

paths:

  /collectivities:
    post:
      tags: [ Collectivités ]
      summary: Ouverture d'une nouvelle collectivité (Point A)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectivityCreate'
      responses:
        '201':
          description: Collectivité créée.
        '400':
          description: Conditions non respectées

  /members/admission:
    post:
      tags: [ Membres ]
      summary: Admission d'un nouveau membre (Règles strictes B-2)
      description: Vérifie les 2 parrains minimum et le paiement (Adhésion + Cotisation annuelle).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberAdmissionUpdate'
      responses:
        '201':
          description: Admission acceptée.
        '400':
          description: Refusé (Parrainage invalide ou montant incomplet).

  /members/{id}/transfer:
    patch:
      tags: [ Membres ]
      summary: Mutation ou démission
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                collectivityId: { type: integer }
                status: { type: string, enum: [ ACTIVE, RESIGNED ] }
      responses:
        '200':
          description: Changement enregistré.

  /payments:
    post:
      tags: [ Finances ]
      summary: Enregistrer un encaissement (Point C)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment'
      responses:
        '201':
          description: Trace écrite générée par le trésorier.

  /collectivities/{id}/treasury:
    get:
      tags: [ Finances ]
      summary: Situation de trésorerie (Point D)
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Liste des comptes (Caisse, Banque, Mobile Money).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'

  /activities/{id}/attendance:
    post:
      tags: [ Activités ]
      summary: Saisie de la feuille de présence (Point F)
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AttendanceRecord'
      responses:
        '200':
          description: Présences validées par le secrétaire.

  /reports/member/{id}:
    get:
      tags: [ Statistiques ]
      summary: Statistiques détaillées d'un membre (Point G)
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: startDate
        in: query
        schema:
          type: string
          format: date
      - name: endDate
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Taux d'assiduité et situation financière.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberStats'

  /reports/federation/global:
    get:
      tags: [ Statistiques ]
      summary: Rapport global de la fédération (Point H)
      parameters:
      - name: startDate
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: endDate
        in: query
        required: true
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Données comparatives des collectivités.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FederationGlobalReport'

components:
  schemas:
    CollectivityCreate:
      type: object
      required: [ name, city, specialty, initialMembersIds ]
      properties:
        name: { type: string }
        city: { type: string }
        specialty: { type: string }
        initialMembersIds: { type: array, items: { type: integer }, minItems: 10 }
        presidentId: { type: integer }
        treasurerId: { type: integer }
        secretaryId: { type: integer }

    MemberAdmissionUpdate:
      type: object
      required: [ lastName, firstName, targetCollectivityId, sponsors, amountPaid ]
      properties:
        lastName: { type: string }
        firstName: { type: string }
        birthDate: { type: string, format: date }
        gender: { type: string, enum: [ MASCULIN, FEMININ ] }
        targetCollectivityId: { type: integer }
        sponsors:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/SponsorDetail'
        amountPaid:
          type: number
          description: "Doit inclure 50.000 Ar + Cotisation annuelle"

    SponsorDetail:
      type: object
      properties:
        sponsorId: { type: integer }
        collectivityId: { type: integer }
        relation: { type: string, example: "Famille, ami, collègue" }

    Account:
      type: object
      properties:
        type: { type: string, enum: [ CAISSE, BANQUE, MOBILE_MONEY ] }
        balance: { type: number }
        bankDetails:
          type: object
          properties:
            bankName: { type: string, enum: [ BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM ] }
            rib: { type: string, minLength: 23, maxLength: 23, description: "Format: BBBBBGGGGGCCCCCCCCCCCKK" }
        mobileMoneyDetails:
          type: object
          properties:
            service: { type: string, enum: [ MVola, Orange Money, Airtel Money ] }
            number: { type: string }

    Payment:
      type: object
      properties:
        memberId: { type: integer }
        amount: { type: number }
        type: { type: string, enum: [ MENSUEL, ANNUEL, PONCTUEL ] }
        method: { type: string, enum: [ ESPECE, VIREMENT, MOBILE_MONEY ] }
        date: { type: string, format: date }

    AttendanceRecord:
      type: object
      properties:
        memberId: { type: integer }
        status: { type: string, enum: [ PRESENT, ABSENT, EXCUSE ] }
        isGuest: { type: boolean }
        reason: { type: string }

    MemberStats:
      type: object
      properties:
        attendanceRate: { type: number }
        totalPaid: { type: number }
        potentialUnpaid: { type: number }

    FederationGlobalReport:
      type: object
      properties:
        collectivityName: { type: string }
        attendanceRate: { type: number }
        percentageUpToDate: { type: number }
        newAdherentsCount: { type: integer }
