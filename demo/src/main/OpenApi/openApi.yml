openapi: 3.0.0
info:
  title: API Fédération Agricole de Madagascar
  description: Système complet incluant les admissions strictes (B-2), les statistiques fédérales (H) et l'identification unique (J).
  version: 1.0.0

tags:
  - name: Collectivités
  - name: Membres
  - name: Finances
  - name: Statistiques

paths:
  /collectivities:
    post:
      tags: [ Collectivités ]
      summary: Création de nouvelles collectivités (Point A)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CollectivityCreate'
      responses:
        '201':
          description: Liste de collectivités créée.

  /collectivities/{id}:
    get:
      tags: [ Collectivités ]
      summary: Obtenir une collectivité par son ID (Point 9)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Détails de la collectivité incluant ses membres.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityDetail'

  /collectivities/{id}/informations:
    put:
      tags: [ Collectivités ]
      summary: Attribution d'un numéro et nom unique (Point J)
      description: |
        Permet à la fédération d'attribuer un numéro et un nom unique. 
        Une fois fixés, ils ne peuvent plus être modifiés.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ number, name ]
              properties:
                number: { type: string, example: "1" }
                name: { type: string, example: "Mpanorina" }
      responses:
        '200':
          description: Informations mises à jour avec succès.
        '403':
          description: Erreur : le nom ou le numéro ne peuvent plus être changés.

  /members:
    post:
      tags: [ Membres ]
      summary: Admission de nouveaux membres (Point B-2)
      description: Admission suivant les nouvelles conditions (2 parrains, frais d'adhésion).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/MemberAdmission'
      responses:
        '201':
          description: Liste de membres admis.

  /collectivities/{id}/financialAccounts:
    get:
      tags: [ Finances ]
      summary: État des comptes à une date donnée (Point 9)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des comptes (Caisse, Mobile Money, Banque) et soldes.

  /reports/federation/global:
    get:
      tags: [ Statistiques ]
      summary: Rapport global mensuel/annuel (Point H)
      parameters:
        - name: startDate
          in: query
          required: true
          schema: { type: string, format: date }
        - name: endDate
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Rapport contenant assiduité, cotisations à jour et nouveaux adhérents.

components:
  schemas:
    CollectivityCreate:
      type: object
      required: [ city, specialty ]
      properties:
        city: { type: string }
        specialty: { type: string }

    CollectivityDetail:
      type: object
      properties:
        id: { type: string }
        number: { type: string }
        name: { type: string }
        city: { type: string }
        specialty: { type: string }
        members:
          type: array
          items:
            $ref: '#/components/schemas/MemberDetail'

    MemberAdmission:
      type: object
      required: [ lastName, firstName, targetCollectivityId, sponsors, amountPaid ]
      properties:
        lastName: { type: string }
        firstName: { type: string }
        targetCollectivityId: { type: string }
        amountPaid: { type: number }
        sponsors:
          type: array
          minItems: 2
          items:
            type: object
            properties:
              sponsorId: { type: string }

    MemberDetail:
      type: object
      properties:
        id: { type: string }
        lastName: { type: string }
        firstName: { type: string }
        profession: { type: string }